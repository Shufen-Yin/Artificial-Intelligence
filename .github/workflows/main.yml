name: Python Data Science CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install Data Science Libraries
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        # Automatically install libraries from your requirements file if it exists
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Pre-install essential libraries for your assignments
        pip install pandas numpy scikit-learn matplotlib

    - name: Lint code for syntax errors
      run: |
        # This will check your Python scripts for errors like missing brackets or undefined variables
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
